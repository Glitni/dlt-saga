# git-cliff configuration — https://git-cliff.org/docs/configuration
#
# Commit messages use capitalised prefixes (Feature:, Fix:, etc.).
# commit_parsers match on these prefixes to assign groups and skip noise.
# The template strips the prefix from commit.message using replace filters.

[changelog]
header = """
# Changelog

All notable changes to dlt-saga are documented here.

"""
body = """
{% if version %}\
## {{ version | trim_start_matches(pat="v") }} — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}\
- {{ commit.message | split(pat="\n") | first | replace(from="Feature: ", to="") | replace(from="Fix: ", to="") | replace(from="Refactor: ", to="") | replace(from="Perf: ", to="") | replace(from="Performance: ", to="") | replace(from="Security: ", to="") | trim | upper_first }}
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = false
filter_unconventional = false
split_commits = false
commit_parsers = [
  { message = "^Feature",  group = "Added" },
  { message = "^Fix",      group = "Fixed" },
  { message = "^Security", group = "Security" },
  { message = "^Perf",     group = "Performance" },
  { message = "^Refactor", group = "Changed" },
  { message = "^(Docs|CI|Chore|Config|Bump|Test|Debug)", skip = true },
  { message = ".*", skip = true },
]
filter_commits = true
tag_pattern = "v[0-9].*"
sort_commits = "newest"
