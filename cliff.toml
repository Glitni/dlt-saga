# git-cliff configuration — https://git-cliff.org/docs/configuration
#
# Commit messages may use any case or abbreviation for prefixes:
# feat/feature/Feature, fix/Fix, refactor/Refactor, perf/Perf/Performance, etc.
# commit_parsers use case-insensitive regex; the body template strips the prefix.

[changelog]
header = """
# Changelog

All notable changes to dlt-saga are documented here.

"""
body = """
{% if version %}\
## {{ version | trim_start_matches(pat="v") }} — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}\
- {{ commit.message | split(pat="\n") | first | regexreplace(pat="^(?i)(feat(ure)?|fix|sec(urity)?|perf(ormance)?|refactor)[:\s]\s*", rep="") | trim | upper_first }}
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = false
filter_unconventional = false
split_commits = false
commit_parsers = [
  { message = "^(?i)feat(ure)?[:\\s]",     group = "Added" },
  { message = "^(?i)fix[:\\s]",            group = "Fixed" },
  { message = "^(?i)sec(urity)?[:\\s]",    group = "Security" },
  { message = "^(?i)perf(ormance)?[:\\s]", group = "Performance" },
  { message = "^(?i)refactor[:\\s]",       group = "Changed" },
  { message = "^(?i)(docs?|ci|chore|config|bump|test|debug)[:\\s]", skip = true },
  { message = ".*", skip = true },
]
filter_commits = true
tag_pattern = "v[0-9].*"
sort_commits = "newest"
