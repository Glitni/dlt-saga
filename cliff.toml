# git-cliff configuration — https://git-cliff.org/docs/configuration
#
# Commit messages may use any case or abbreviation for prefixes:
# feat/feature/Feature, fix/Fix, refactor/Refactor, perf/Perf/Performance, etc.
# commit_parsers use case-insensitive regex; the body template strips the prefix.

[changelog]
header = """
# Changelog

All notable changes to dlt-saga are documented here.

"""
body = """
{% if version %}\
## {{ version | trim_start_matches(pat="v") }} — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}
{% for commit in commits %}\
- {{ commit.message | split(pat="\n") | first | replace_regex(from="^(?i)(feat(ure)?|fix|sec(urity)?|perf(ormance)?|refactor)(\\(.+\\))?!?[:\\s]\\s*", to="") | trim | upper_first }}
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = false
filter_unconventional = false
split_commits = false
# Breaking changes (conventional `type!:` marker) are matched FIRST, so any
# breaking commit lands under one prominent section regardless of its type.
# Group names carry an HTML-comment sort prefix (stripped in the template) so
# the sections render in a deliberate order rather than alphabetically.
commit_parsers = [
  { message = "^(?i)\\w+(\\(.+\\))?!:",    group = "<!-- 0 -->Breaking Changes" },
  { message = "^(?i)feat(ure)?[:\\s]",     group = "<!-- 1 -->Added" },
  { message = "^(?i)refactor[:\\s]",       group = "<!-- 2 -->Changed" },
  { message = "^(?i)fix[:\\s]",            group = "<!-- 3 -->Fixed" },
  { message = "^(?i)perf(ormance)?[:\\s]", group = "<!-- 4 -->Performance" },
  { message = "^(?i)sec(urity)?[:\\s]",    group = "<!-- 5 -->Security" },
  { message = "^(?i)(docs?|ci|chore|config|bump|test|debug)[:\\s]", skip = true },
  { message = ".*", skip = true },
]
filter_commits = true
tag_pattern = "v[0-9].*"
sort_commits = "newest"
