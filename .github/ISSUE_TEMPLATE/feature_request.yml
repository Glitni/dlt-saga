name: Feature request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening, please search existing issues and Discussions to see if this has already been raised.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem you are trying to solve, not just the solution.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like to see this addressed? Leave blank to open for discussion.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why you ruled them out.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, examples, or screenshots that might help.
