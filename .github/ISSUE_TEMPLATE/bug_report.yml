name: Bug report
description: Something is not working as documented
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please fill in as much as you can — a minimal reproduction
        is the single most helpful thing you can include.

  - type: input
    id: version
    attributes:
      label: dlt-saga version
      placeholder: "e.g. 0.2.4  (run: pip show dlt-saga)"
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "e.g. 3.11.8"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Ubuntu 22.04, macOS 14, Windows 11"
    validations:
      required: true

  - type: dropdown
    id: destination
    attributes:
      label: Destination type
      options:
        - BigQuery
        - Databricks
        - DuckDB
        - Other (describe below)
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: |
        The smallest config + command that reproduces the issue.
        Include relevant fragments from pipeline configs, saga_project.yml, and the saga command you ran.
      render: yaml
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output
      description: Full error message and traceback. Add --verbose for more detail.
      render: shell
