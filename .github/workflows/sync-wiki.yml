name: Sync wiki

# Mirrors wiki/ in this repo into the GitHub wiki repository.

on:
  push:
    branches: [main]
    paths: ["wiki/**"]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Push wiki to GitHub wiki
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki_repo

          # Copy all .md files from wiki/ to the wiki root (flattened)
          find wiki -name "*.md" -exec cp {} wiki_repo/ \;

          cd wiki_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Sync wiki from main repo @ ${{ github.sha }}"
          git push
